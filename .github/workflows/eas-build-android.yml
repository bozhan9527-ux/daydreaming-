name: Build Android APK (EAS)

# 手動觸發:GitHub 網頁/App 的 Actions 分頁按「Run workflow」。
# 需要先在 repo Settings > Secrets and variables > Actions 新增 EXPO_TOKEN
# (從 expo.dev 帳號設定的 Access Tokens 頁面產生)。
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Link EAS project (first run creates it, later runs are no-ops)
        run: eas init --non-interactive --force

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive --wait
